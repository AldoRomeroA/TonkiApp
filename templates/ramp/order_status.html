<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orden - Tonki Ramp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/static/css/main_styles_tiankawards.css">
</head>
<body class="gradient-bg">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="{{ url_for('ramp_page') }}"><i class="bi bi-arrow-left-right"></i> Tonki Ramp</a>
    <a class="nav-link text-white" href="{{ url_for('ramp_page') }}">← Volver</a>
  </div>
</nav>

<div class="container py-4">
  <h1 class="text-white mb-3">Estado de la orden</h1>
  <div class="card">
    <div class="card-body">
      <p><strong>ID:</strong> {{ order.get('orderId') or order.get('id') or 'N/A' }}</p>
      <p><strong>Estado:</strong> <span class="badge bg-{{ 'success' if order.get('status') == 'completed' else 'warning' if order.get('status') == 'funded' else 'secondary' }}">{{ order.get('status') or 'N/A' }}</span></p>
      {% if status_page %}
      <a href="{{ status_page }}" target="_blank" class="btn btn-primary">
        <i class="bi bi-box-arrow-up-right"></i> Ver en Etherfuse
      </a>
      {% endif %}
      {% if is_sandbox %}
      <span class="ms-2 text-muted">(Sandbox)</span>
      {% endif %}
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
