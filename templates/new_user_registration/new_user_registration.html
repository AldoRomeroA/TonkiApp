<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Crear Usuario · Tiankawards</title>
        <style>
            /* ===== VERSION UNIFICADA: main_styles_tiankawards + mejoras ===== */

            /* ------- Variables globales ------- */
            :root {
                --base-dark: #000;
                --base-dark-2: #0e1c2a;
                --accent-gold: #f6c941;
                --accent-yellow: #f6c941;
                --accent-action: #ff6933;
                --white: #ffffff;
                --card-bg: rgba(255, 255, 255, 0.03);
                --card-border: rgba(255, 255, 255, 0.06);
                --muted: rgba(255, 255, 255, 0.65);

                /* mejoras adicionales */
                --input-bg: rgba(255, 255, 255, 0.04);
                --input-border: rgba(255, 255, 255, 0.08);
                --input-focus-glow: rgba(246, 201, 65, 0.3);
                --card-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.7);
                --success-green: #4caf50;
                --error-red: #ff5252;
                --info-blue: #64b5f6;
            }

            /* ------- Fondo principal con degradado ------- */
            body.gradient-bg {
                background: linear-gradient(
                    180deg,
                    var(--base-dark) 1%,
                    var(--base-dark-2) 100%
                );
                min-height: 100vh;
                color: var(--white);
                font-family:
                    "Inter",
                    "Segoe UI",
                    system-ui,
                    -apple-system,
                    "Helvetica Neue",
                    Arial;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                margin: 0;
                position: relative;
            }

            /* textura radial para profundidad */
            body.gradient-bg::before {
                content: "";
                position: fixed;
                inset: 0;
                background:
                    radial-gradient(
                        600px 300px at 10% 20%,
                        rgba(229, 201, 78, 0.08),
                        transparent 40%
                    ),
                    radial-gradient(
                        500px 250px at 90% 80%,
                        rgba(255, 85, 50, 0.06),
                        transparent 40%
                    ),
                    radial-gradient(
                        800px 400px at 50% 50%,
                        rgba(255, 255, 255, 0.02),
                        transparent 50%
                    );
                pointer-events: none;
                z-index: 0;
            }

            /* ------- Contenedor central ------- */
            .center-wrapper {
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                padding: 1.5rem;
                position: relative;
                z-index: 2;
            }

            /* ------- Tarjeta principal ------- */
            .card {
                width: 440px;
                max-width: 100%;
                border-radius: 42px;
                background: rgba(20, 36, 52, 0.9);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                border: 1px solid rgba(255, 255, 255, 0.08);
                box-shadow:
                    var(--card-shadow),
                    0 0 0 1px rgba(246, 201, 65, 0.1);
                color: var(--white);
                padding: 2.5rem 2.2rem;
                transition:
                    transform 0.3s ease,
                    box-shadow 0.3s ease;
            }

            .card:hover {
                transform: translateY(-5px);
                box-shadow:
                    0 30px 50px -15px rgba(0, 0, 0, 0.8),
                    0 0 0 1px rgba(246, 201, 65, 0.3);
            }

            /* ------- Logo ------- */
            .tiankawards-logo {
                width: 110px;
                height: 110px;
                object-fit: cover;
                border-radius: 50%;
                border: 3px solid var(--accent-gold);
                display: block;
                margin: 0 auto 1.5rem auto;
                background: rgba(246, 201, 65, 0.08);
                box-shadow:
                    0 0 0 4px rgba(246, 201, 65, 0.2),
                    0 15px 25px -8px rgba(0, 0, 0, 0.6);
                transition: all 0.4s ease;
            }

            .tiankawards-logo:hover {
                transform: rotate(5deg) scale(1.05);
                border-color: #ffdf7e;
                box-shadow:
                    0 0 0 8px rgba(246, 201, 65, 0.25),
                    0 20px 30px -10px #000;
            }

            /* ------- Título con degradado ------- */
            .card h3 {
                text-align: center;
                font-size: 2.2rem;
                font-weight: 700;
                margin: 0 0 2rem 0;
                background: linear-gradient(
                    135deg,
                    #ffffff 0%,
                    var(--accent-gold) 80%
                );
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                letter-spacing: -0.02em;
                text-shadow: 0 2px 10px rgba(246, 201, 65, 0.2);
            }

            /* ------- Grupos de formulario ------- */
            .form-group {
                display: flex;
                flex-direction: column;
                margin-bottom: 1.8rem;
                gap: 0.5rem;
            }

            .form-label {
                color: rgba(255, 255, 255, 0.8);
                font-size: 0.8rem;
                font-weight: 600;
                letter-spacing: 0.05em;
                text-transform: uppercase;
                margin-left: 0.5rem;
            }

            .form-input {
                padding: 1rem 1.2rem;
                border-radius: 20px;
                border: 1.5px solid rgba(255, 255, 255, 0.1);
                background: rgba(0, 0, 0, 0.3);
                color: var(--white);
                font-size: 1rem;
                outline: none;
                transition: all 0.25s ease;
                backdrop-filter: blur(4px);
            }

            .form-input:hover {
                border-color: rgba(255, 255, 255, 0.2);
                background: rgba(0, 0, 0, 0.4);
            }

            .form-input:focus {
                border-color: var(--accent-gold);
                background: rgba(0, 0, 0, 0.5);
                box-shadow: 0 0 0 4px var(--input-focus-glow);
            }

            .form-input::placeholder {
                color: rgba(255, 255, 255, 0.3);
                font-weight: 300;
                font-size: 0.95rem;
            }

            /* ------- Botón principal ------- */
            .btn-submit {
                width: 100%;
                padding: 1.1rem;
                border-radius: 40px;
                border: none;
                font-weight: 700;
                font-size: 1.1rem;
                letter-spacing: 0.05em;
                cursor: pointer;
                background: linear-gradient(135deg, #ff6933 0%, #ff934d 100%);
                color: var(--white);
                transition: all 0.3s ease;
                box-shadow: 0 10px 25px rgba(255, 105, 51, 0.4);
                text-transform: uppercase;
                margin: 1rem 0 0.5rem 0;
                position: relative;
                overflow: hidden;
            }

            .btn-submit::before {
                content: "";
                position: absolute;
                top: 0;
                left: -100%;
                width: 100%;
                height: 100%;
                background: linear-gradient(
                    90deg,
                    transparent,
                    rgba(255, 255, 255, 0.2),
                    transparent
                );
                transition: left 0.6s ease;
            }

            .btn-submit:hover::before {
                left: 100%;
            }

            .btn-submit:hover {
                transform: translateY(-4px);
                background: linear-gradient(135deg, #ff7d4d 0%, #ffa570 100%);
                box-shadow: 0 18px 30px rgba(255, 105, 51, 0.6);
            }

            .btn-submit:active {
                transform: translateY(0);
                box-shadow: 0 8px 20px rgba(255, 105, 51, 0.4);
            }

            /* ------- Separador decorativo ------- */
            .form-divider {
                height: 1px;
                background: linear-gradient(
                    90deg,
                    transparent,
                    rgba(246, 201, 65, 0.3),
                    rgba(255, 255, 255, 0.2),
                    transparent
                );
                margin: 1.5rem 0 1rem 0;
            }

            /* ------- Caja de resultado/mensajes ------- */
            .result-box {
                margin-top: 2rem;
                padding: 1.2rem;
                border-radius: 20px;
                font-size: 0.9rem;
                background: rgba(0, 0, 0, 0.35);
                border: 1px solid rgba(246, 201, 65, 0.3);
                color: var(--accent-gold);
                word-break: break-word;
                font-family: "Monaco", "Menlo", "Courier New", monospace;
                max-height: 200px;
                overflow-y: auto;
                backdrop-filter: blur(4px);
                transition: all 0.3s ease;
                line-height: 1.5;
                box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
            }

            /* clases para diferentes tipos de mensaje */
            .result-box.success {
                border-color: var(--success-green);
                color: #a5d6a7;
                background: rgba(76, 175, 80, 0.1);
            }

            .result-box.error {
                border-color: var(--error-red);
                color: #ff8a80;
                background: rgba(255, 82, 82, 0.1);
            }

            .result-box.info {
                border-color: var(--info-blue);
                color: #bbdefb;
                background: rgba(100, 181, 246, 0.1);
            }

            /* ------- Ajustes de texto ------- */
            .fs-3,
            .fs-6 {
                color: #ff6933;
            }

            .table-id-color {
                color: #f6c941;
            }

            /* ------- Responsive ------- */
            @media (max-width: 480px) {
                .card {
                    padding: 2rem 1.5rem;
                }

                .card h3 {
                    font-size: 1.8rem;
                }

                .tiankawards-logo {
                    width: 90px;
                    height: 90px;
                }
            }
        </style>
    </head>

    <body class="gradient-bg">
        <div class="center-wrapper">
            <div class="card">
                <!-- Logo -->
                <img
                    src="logo.png"
                    class="tiankawards-logo"
                    alt="Tiankawards"
                />

                <h3>✨ Crear Usuario</h3>

                <form id="createUserForm">
                    <div class="form-group">
                        <label class="form-label">Nombre completo</label>
                        <input
                            type="text"
                            name="name"
                            class="form-input"
                            placeholder="ej. Ana Pérez Martínez"
                            required
                        />
                    </div>

                    <div class="form-group">
                        <label class="form-label">Correo electrónico</label>
                        <input
                            type="email"
                            name="email"
                            class="form-input"
                            placeholder="tú@ejemplo.com"
                            required
                        />
                    </div>

                    <div class="form-group">
                        <label class="form-label">Contraseña</label>
                        <input
                            type="password"
                            name="password"
                            class="form-input"
                            placeholder="mínimo 8 caracteres"
                            required
                            minlength="8"
                        />
                    </div>

                    <div class="form-divider"></div>

                    <button type="submit" class="btn-submit">
                        🚀 CREAR CUENTA
                    </button>
                </form>

                <!-- Caja de mensajes personalizados -->
                <div id="result" class="result-box info">
                    👋 ¡Bienvenido! Completa el formulario para registrarte.
                </div>
            </div>
        </div>

        <script>
            (function () {
                const form = document.getElementById("createUserForm");
                const resultDiv = document.getElementById("result");

                // Función para mostrar mensajes personalizados
                function showMessage(message, type = "info") {
                    resultDiv.textContent = message;
                    // remover clases anteriores y añadir la nueva
                    resultDiv.classList.remove("success", "error", "info");
                    resultDiv.classList.add(type);
                }

                // Validación básica antes de enviar
                function validateForm(data) {
                    if (data.name.length < 2) {
                        return "❌ El nombre debe tener al menos 2 caracteres";
                    }
                    if (
                        !data.email.includes("@") ||
                        !data.email.includes(".")
                    ) {
                        return "❌ Ingresa un correo electrónico válido";
                    }
                    if (data.password.length < 8) {
                        return "❌ La contraseña debe tener mínimo 8 caracteres";
                    }
                    return null;
                }

                form.addEventListener("submit", async (e) => {
                    e.preventDefault();

                    const data = {
                        name: form.name.value.trim(),
                        email: form.email.value.trim(),
                        password: form.password.value,
                    };

                    // Validar localmente
                    const validationError = validateForm(data);
                    if (validationError) {
                        showMessage(validationError, "error");
                        return;
                    }

                    // Mensaje de carga
                    showMessage("⏳ Creando tu cuenta...", "info");

                    try {
                        // Simular llamada al backend (fetch real)
                        const response = await fetch("/create_user", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                            },
                            body: JSON.stringify(data),
                        });

                        const result = await response.json();

                        // Mensajes personalizados basados en la respuesta
                        if (response.ok) {
                            if (result.success || result.message) {
                                // Mensaje de éxito personalizado
                                const userName = data.name.split(" ")[0]; // primer nombre
                                showMessage(
                                    `🎉 ¡Felicidades ${userName}! Tu cuenta ha sido creada exitosamente.\n🔑 Bienvenido a Tiankawards.`,
                                    "success",
                                );
                            } else {
                                showMessage(
                                    "✅ Usuario registrado correctamente",
                                    "success",
                                );
                            }
                        } else {
                            // Mensaje de error personalizado según el código
                            if (response.status === 409) {
                                showMessage(
                                    "⚠️ Este correo electrónico ya está registrado.\n¿Olvidaste tu contraseña?",
                                    "error",
                                );
                            } else if (response.status === 400) {
                                showMessage(
                                    "❌ Datos inválidos. Revisa la información.",
                                    "error",
                                );
                            } else {
                                showMessage(
                                    `❌ Error ${response.status}: ${result.message || "No se pudo crear el usuario"}`,
                                    "error",
                                );
                            }
                        }
                    } catch (error) {
                        // Mensaje de error de conexión personalizado
                        showMessage(
                            "🔌 Error de conexión con el servidor.\nVerifica tu internet o inténtalo más tarde.",
                            "error",
                        );
                        console.error("Error:", error);
                    }
                });

                // Mensajes de ayuda en los campos (opcional)
                const inputs = document.querySelectorAll(".form-input");
                inputs.forEach((input) => {
                    input.addEventListener("focus", () => {
                        if (input.name === "password") {
                            showMessage(
                                "🔐 La contraseña debe tener al menos 8 caracteres",
                                "info",
                            );
                        } else if (input.name === "email") {
                            showMessage(
                                "📧 Ejemplo: nombre@dominio.com",
                                "info",
                            );
                        } else if (input.name === "name") {
                            showMessage(
                                "📝 Ingresa tu nombre completo",
                                "info",
                            );
                        }
                    });
                });

                // Restaurar mensaje inicial al salir de los campos
                inputs.forEach((input) => {
                    input.addEventListener("blur", () => {
                        if (
                            !document.activeElement.classList.contains(
                                "form-input",
                            )
                        ) {
                            showMessage(
                                "👋 ¡Bienvenido! Completa el formulario para registrarte.",
                                "info",
                            );
                        }
                    });
                });
            })();
        </script>
    </body>
</html>
