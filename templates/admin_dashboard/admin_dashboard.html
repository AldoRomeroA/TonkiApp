<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard - TonkiApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/main_styles_tiankawards.css">
</head>
<body class="gradient-bg">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-light sticky-top navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#">
            <i class="bi bi-wallet2"></i> TonkiApp Dashboard
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="/dashboard">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/">
                        <i class="bi bi-box-arrow-right"></i> Salir
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/admin_airdrop">
                        <i class="bi bi-dropbox"></i> Airdrop
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container dashboard-container">
    <!-- Header -->
    <div class="row mb-4">
        <div class="col-12">
            <h1 class="text-white mb-3">
                <i class="bi bi-people-fill"></i> Gestión de Usuarios
            </h1>
            <p class="text-white-50">Usuarios registrados en la plataforma Web3</p>
        </div>
    </div>

    <!-- Stats Cards -->
    <div class="row mb-4">
        <div class="col-md-4 mb-3">
            <div class="card text-center">
                <div class="card-body">
                    <i class="bi bi-people fs-1 text-primary"></i>
                    <h3 class="mt-2">{{ usuarios|length }}</h3>
                    <p class="text-muted mb-0">Total Usuarios</p>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card text-center">
                <div class="card-body">
                    <i class="bi bi-wallet fs-1 text-success"></i>
                    <h3 class="mt-2">{{ usuarios|selectattr('wallet_address')|list|length }}</h3>
                    <p class="text-muted mb-0">Con Wallet</p>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card text-center">
                <div class="card-body">
                    <i class="bi bi-database fs-1 text-info"></i>
                    <h3 class="mt-2">RDS MySQL</h3>
                    <p class="text-muted mb-0">Conectado</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
