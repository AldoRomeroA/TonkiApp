<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard - TonkiApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/main_styles_tiankawards.css">
</head>
<body class="gradient-bg">

<nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#" style="color: var(--accent-action);">
            <i class="bi bi-hexagon-fill" style="color: var(--accent-gold);"></i> TonkiApp
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="/dashboard">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/admin_airdrop">Airdrop</a>
                </li>
                <li class="nav-item ms-lg-3">
                    <a class="btn btn-primary btn-sm text-white" href="/">Salir</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row mb-5">
        <div class="col-12 text-center text-md-start">
            <h1 class="fw-bold" style="color: var(--accent-action);">
                Gestión de Usuarios
            </h1>
            <p class="text-muted">Panel administrativo de la plataforma Web3</p>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-md-4 mb-4">
            <div class="card h-100 border-0">
                <div class="card-body d-flex align-items-center">
                    <div class="icon-box me-3" style="background: #FFF9E6; padding: 15px; border-radius: 12px;">
                        <i class="bi bi-people fs-2" style="color: var(--accent-gold);"></i>
                    </div>
                    <div>
                        <h3 class="fw-bold mb-0">{{ usuarios|length }}</h3>
                        <p class="text-muted small mb-0">Total Usuarios</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-4">
            <div class="card h-100 border-0">
                <div class="card-body d-flex align-items-center">
                    <div class="icon-box me-3" style="background: #E6F0FF; padding: 15px; border-radius: 12px;">
                        <i class="bi bi-wallet2 fs-2" style="color: #007AFF;"></i>
                    </div>
                    <div>
                        <h3 class="fw-bold mb-0">{{ usuarios|selectattr('wallet_address')|list|length }}</h3>
                        <p class="text-muted small mb-0">Wallets Vinculadas</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-4">
            <div class="card h-100 border-0">
                <div class="card-body d-flex align-items-center">
                    <div class="icon-box me-3" style="background: #E6FFF0; padding: 15px; border-radius: 12px;">
                        <i class="bi bi-shield-check fs-2" style="color: #34C759;"></i>
                    </div>
                    <div>
                        <h3 class="fw-bold mb-0 text-uppercase" style="font-size: 1.1rem;">RDS MySQL</h3>
                        <p class="text-muted small mb-0">Estado: En línea</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
